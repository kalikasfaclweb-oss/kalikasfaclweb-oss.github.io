<!DOCTYPE html>
<html lang="ne">
<head>
  <meta charset="UTF-8">
  <title>साना किसान कृषि सहकारी संस्था लि. कालिका</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #14532d; }
    
    /* 🌟 १००% परफेक्ट स्केल (कपाल नकाट्ने सुत्र) */
    .perfect-scale-frame { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
  </style>
</head>
<body>

  <!-- 🚨 तलको 'src' भित्र आफ्नो Apps Script को सक्कली /exec वाला लामो लिंक हाल्नुहोला -->
  <iframe class="hiding-tunnel" src="https://script.google.com/macros/s/AKfycbxhQyY2hYrDo1xZrajaX8kAyiALSIlm2SMpAPGnOK_e9R5ru8Qnyya3wqKvdza9u1QA/exec"></iframe>

</body>
</html>
